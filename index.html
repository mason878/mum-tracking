<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Mum Graphical Tracking</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{--green:#2E7D32;--green-d:#1B5E20;--green-l:#E8F5E9;--ink:#1f2a24;--mut:#6b7a70;
--ahead:#1565C0;--on:#2E7D32;--behind:#C62828;--bg:#f6f8f6;--card:#fff;--line:#e2e8e3;--evt:#8E24AA;}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);}
header{background:var(--green-d);color:#fff;padding:14px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
header h1{font-size:18px;margin:0;font-weight:700;letter-spacing:.2px;}
header .sp{flex:1}
header input{border:0;border-radius:6px;padding:7px 10px;font-size:13px;min-width:150px}
header .url{min-width:280px}
header label{font-size:11px;opacity:.85;display:block;margin-bottom:2px}
header .fld{display:flex;flex-direction:column}
.btn{background:#fff;color:var(--green-d);border:0;border-radius:6px;padding:8px 14px;font-weight:600;cursor:pointer;font-size:13px}
.btn:hover{background:var(--green-l)}
.btn.ghost{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.5)}
.btn.go{background:var(--green);color:#fff}
nav{display:flex;gap:4px;background:var(--card);padding:0 16px;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5}
nav button{background:none;border:0;padding:14px 16px;font-size:14px;font-weight:600;color:var(--mut);cursor:pointer;border-bottom:3px solid transparent}
nav button.active{color:var(--green-d);border-bottom-color:var(--green)}
main{padding:20px;max-width:1200px;margin:0 auto}
.status-bar{font-size:12px;color:var(--mut);padding:6px 20px;background:var(--green-l);border-bottom:1px solid var(--line)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.card h3{margin:0 0 2px;font-size:14px}
.card .sub{font-size:11px;color:var(--mut);margin-bottom:8px}
.metric{display:flex;align-items:baseline;gap:8px;margin:6px 0}
.metric b{font-size:22px}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;color:#fff}
.pill.ahead{background:var(--ahead)}.pill.on{background:var(--on)}.pill.behind{background:var(--behind)}.pill.none{background:#9aa6a0}
.tag{display:inline-block;padding:1px 7px;border-radius:5px;font-size:10px;font-weight:700;background:#ede7f6;color:var(--evt);margin-right:4px}
.tag.bc{background:#e3f2fd;color:#1565C0}
.mini{height:54px}
.row{display:flex;gap:18px;flex-wrap:wrap;align-items:flex-end;margin-bottom:14px}
select,input[type=number],input[type=text],input[type=date]{padding:8px 10px;border:1px solid var(--line);border-radius:7px;font-size:14px;background:#fff}
.chartwrap{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px;height:430px}
table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden;font-size:13px}
th,td{padding:8px 10px;text-align:center;border-bottom:1px solid var(--line)}
th{background:var(--green-l);color:var(--green-d);font-weight:700}
td.l,th.l{text-align:left}
tr.cur{background:#fffbe6}
.delta-pos{color:var(--ahead);font-weight:600}.delta-neg{color:var(--behind);font-weight:600}.delta-on{color:var(--on);font-weight:600}
.entry-tbl input{width:80px;text-align:center}
.legend{font-size:12px;color:var(--mut);margin:10px 2px}
.legend span{display:inline-block;width:11px;height:11px;border-radius:2px;margin:0 4px 0 12px;vertical-align:middle}
.toast{position:fixed;bottom:20px;right:20px;background:var(--green-d);color:#fff;padding:12px 18px;border-radius:8px;font-size:14px;opacity:0;transform:translateY(10px);transition:.25s;z-index:50}
.toast.show{opacity:1;transform:none}
h2.sec{font-size:15px;color:var(--green-d);margin:18px 0 10px}
.hint{font-size:12px;color:var(--mut);max-width:680px;line-height:1.5}
.panel{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:14px}
.evt-list{list-style:none;margin:0;padding:0}
.evt-list li{padding:7px 0;border-bottom:1px solid var(--line);font-size:13px;display:flex;gap:10px;align-items:baseline}
.evt-list li:last-child{border-bottom:0}
.evt-wk{font-weight:700;color:var(--evt);min-width:46px}
.evt-note{color:var(--mut)}
.fld label{font-size:11px;color:var(--mut);display:block;margin-bottom:3px}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.ph{border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#fafafa}
.ph img{width:100%;height:130px;object-fit:cover;display:block;cursor:pointer;background:#eee}
.ph .cap{font-size:11px;padding:5px 7px;color:var(--mut)}
.muted{color:var(--mut);font-size:13px}
.idbadge{display:inline-block;background:var(--green-d);color:#fff;font-weight:700;border-radius:6px;padding:2px 9px;font-size:14px;letter-spacing:.5px}
.erow{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
.eStat{font-size:12px;font-weight:600}.eStat.ok{color:var(--on)}.eStat.q{color:#b26a00}
.qbadge{font-weight:700;color:#b26a00;font-size:12px}
@media print{
  header .fld,header .btn,nav,.status-bar,#entry,.no-print{display:none!important}
  body{background:#fff}
  header{background:#fff;color:#000;border-bottom:2px solid var(--green)}
  .card,.chartwrap,table,.panel{break-inside:avoid;box-shadow:none}
  main{max-width:none}
}
</style>
</head>
<body>
<header>
  <h1>🌼 Mum Graphical Tracking</h1>
  <div class="sp"></div>
  <div class="fld"><label>Google Sheet Web App URL</label><input id="apiUrl" class="url" placeholder="https://script.google.com/macros/s/…/exec"/></div>
  <div class="fld"><label>Your name</label><input id="who" placeholder="e.g. Mason"/></div>
  <button class="btn" onclick="connect()">Connect</button>
  <button class="btn ghost" onclick="window.print()">PDF / Print</button>
</header>
<nav>
  <button data-tab="dash" class="active" onclick="tab('dash')">Dashboard</button>
  <button data-tab="detail" onclick="tab('detail')">Crop Detail</button>
  <button data-tab="log" onclick="tab('log')">Events Log</button>
</nav>
<div class="status-bar"><span id="status">Using built-in data (offline). Connect a Sheet URL to go live.</span> <span id="qbadge" class="qbadge"></span></div>
<main>
  <section id="dash"></section>
  <section id="detail" style="display:none">
    <div class="row">
      <div class="fld"><label class="legend" style="margin:0">Crop</label><select id="cropSel" onchange="renderDetail()"></select></div>
      <button class="btn" onclick="stepCrop(-1)">‹ Prev</button>
      <button class="btn" onclick="stepCrop(1)">Next ›</button>
    </div>
    <div id="detailHdr" style="margin:4px 0 12px"></div>
    <div class="chartwrap"><canvas id="bigChart"></canvas></div>
    <div class="legend"><span style="background:#2E7D32"></span>Target curve<span style="background:#1565C0"></span>Actual height<span style="background:#8E24AA"></span>Event</div>
    <div id="detailTable"></div>
    <div id="eventsBox"></div>
    <div id="photosBox"></div>
  </section>
  <section id="log" style="display:none"></section>
</main>
<div class="toast" id="toast"></div>
<script>
const DEFAULT_API_URL = 'https://script.google.com/macros/s/AKfycbzyHISxggVA5EfjmLxKXL5fibAJQMmn-ecXeStKBp9VCXv8MuoV6ixzWvgo-r05WouXUg/exec';
const DEFAULT_DATA = {"crops": [{"id": "8in Cuth Black Cloth WK33", "name": "8in Cuth Black Cloth WK33", "pot": "8\"", "grower": "all series", "location": "Black Cloth", "startWeek": 22, "weeksToFinish": 11, "startHeight": 6, "finishHeight": 15, "finishWeek": 33, "order": 1}, {"id": "10in HB Cuth Staviski WK33", "name": "10in HB Cuth Staviski WK33", "pot": "10\" HB", "grower": "Staviski", "location": "Black Cloth", "startWeek": 20, "weeksToFinish": 13, "startHeight": 6, "finishHeight": 16, "finishWeek": 33, "order": 2}, {"id": "8in Cuth Black Cloth WK34", "name": "8in Cuth Black Cloth WK34", "pot": "8\"", "grower": "all series", "location": "Black Cloth", "startWeek": 23, "weeksToFinish": 11, "startHeight": 6, "finishHeight": 15, "finishWeek": 34, "order": 3}, {"id": "8in Cuth Black Cloth WK35", "name": "8in Cuth Black Cloth WK35", "pot": "8\"", "grower": "all series", "location": "Black Cloth", "startWeek": 24, "weeksToFinish": 11, "startHeight": 6, "finishHeight": 15, "finishWeek": 35, "order": 4}, {"id": "10in Planter Cuth Aduro WK35", "name": "10in Planter Cuth Aduro WK35", "pot": "10\"", "grower": "Aduro", "location": "Black Cloth", "startWeek": 22, "weeksToFinish": 13, "startHeight": 7, "finishHeight": 19, "finishWeek": 35, "order": 5}, {"id": "10in Planter Cuth Staviski WK35", "name": "10in Planter Cuth Staviski WK35", "pot": "10\"", "grower": "Staviski", "location": "Black Cloth", "startWeek": 22, "weeksToFinish": 13, "startHeight": 7, "finishHeight": 19, "finishWeek": 35, "order": 6}, {"id": "8in Cuth Fonti WK36", "name": "8in Cuth Fonti WK36", "pot": "8\"", "grower": "Fonti", "location": "", "startWeek": 25, "weeksToFinish": 11, "startHeight": 6, "finishHeight": 15, "finishWeek": 36, "order": 7}, {"id": "8in Cuth Black Cloth WK36", "name": "8in Cuth Black Cloth WK36", "pot": "8\"", "grower": "all series", "location": "Black Cloth", "startWeek": 25, "weeksToFinish": 11, "startHeight": 6, "finishHeight": 15, "finishWeek": 36, "order": 8}, {"id": "10in Planter Cuth Aduro WK36", "name": "10in Planter Cuth Aduro WK36", "pot": "10\"", "grower": "Aduro", "location": "Black Cloth", "startWeek": 23, "weeksToFinish": 13, "startHeight": 7, "finishHeight": 19, "finishWeek": 36, "order": 9}, {"id": "10in Planter Cuth Fonti WK36", "name": "10in Planter Cuth Fonti WK36", "pot": "10\"", "grower": "Fonti", "location": "", "startWeek": 23, "weeksToFinish": 13, "startHeight": 7, "finishHeight": 19, "finishWeek": 36, "order": 10}, {"id": "10in Planter Cuth Staviski WK36", "name": "10in Planter Cuth Staviski WK36", "pot": "10\"", "grower": "Staviski", "location": "Black Cloth", "startWeek": 23, "weeksToFinish": 13, "startHeight": 7, "finishHeight": 19, "finishWeek": 36, "order": 11}, {"id": "10in HB Cuth Aduro WK36", "name": "10in HB Cuth Aduro WK36", "pot": "10\" HB", "grower": "Aduro", "location": "Black Cloth", "startWeek": 23, "weeksToFinish": 13, "startHeight": 6, "finishHeight": 16, "finishWeek": 36, "order": 12}, {"id": "10in HB Cuth Staviski WK36", "name": "10in HB Cuth Staviski WK36", "pot": "10\" HB", "grower": "Staviski", "location": "Black Cloth", "startWeek": 23, "weeksToFinish": 13, "startHeight": 6, "finishHeight": 16, "finishWeek": 36, "order": 13}, {"id": "8in Cuth Fonti WK37", "name": "8in Cuth Fonti WK37", "pot": "8\"", "grower": "Fonti", "location": "", "startWeek": 26, "weeksToFinish": 11, "startHeight": 6, "finishHeight": 15, "finishWeek": 37, "order": 14}, {"id": "8in Cuth Padre WK37", "name": "8in Cuth Padre WK37", "pot": "8\"", "grower": "Padre", "location": "", "startWeek": 26, "weeksToFinish": 11, "startHeight": 6, "finishHeight": 15, "finishWeek": 37, "order": 15}, {"id": "10in Planter Cuth Padre WK37", "name": "10in Planter Cuth Padre WK37", "pot": "10\"", "grower": "Padre", "location": "", "startWeek": 24, "weeksToFinish": 13, "startHeight": 7, "finishHeight": 19, "finishWeek": 37, "order": 16}, {"id": "10in HB Cuth Fonti WK37", "name": "10in HB Cuth Fonti WK37", "pot": "10\" HB", "grower": "Fonti", "location": "", "startWeek": 24, "weeksToFinish": 13, "startHeight": 6, "finishHeight": 16, "finishWeek": 37, "order": 17}, {"id": "12in Planter Tricolor Cuth Custom WK37", "name": "12in Planter Tricolor Cuth Custom WK37", "pot": "12\"", "grower": "Custom", "location": "", "startWeek": 24, "weeksToFinish": 13, "startHeight": 10, "finishHeight": 21, "finishWeek": 37, "order": 18}, {"id": "14in Cuth Fonti WK37", "name": "14in Cuth Fonti WK37", "pot": "14\"", "grower": "Fonti", "location": "", "startWeek": 21, "weeksToFinish": 16, "startHeight": 11, "finishHeight": 26, "finishWeek": 37, "order": 19}, {"id": "14in Cuth Padre WK37", "name": "14in Cuth Padre WK37", "pot": "14\"", "grower": "Padre", "location": "", "startWeek": 21, "weeksToFinish": 16, "startHeight": 11, "finishHeight": 26, "finishWeek": 37, "order": 20}, {"id": "8in Cuth Arluno WK38", "name": "8in Cuth Arluno WK38", "pot": "8\"", "grower": "Arluno", "location": "", "startWeek": 27, "weeksToFinish": 11, "startHeight": 6, "finishHeight": 15, "finishWeek": 38, "order": 21}, {"id": "8in Cuth Magnus WK38", "name": "8in Cuth Magnus WK38", "pot": "8\"", "grower": "Magnus", "location": "", "startWeek": 27, "weeksToFinish": 11, "startHeight": 6, "finishHeight": 15, "finishWeek": 38, "order": 22}, {"id": "8in Cuth Padre WK38", "name": "8in Cuth Padre WK38", "pot": "8\"", "grower": "Padre", "location": "", "startWeek": 27, "weeksToFinish": 11, "startHeight": 6, "finishHeight": 15, "finishWeek": 38, "order": 23}, {"id": "10in Planter Cuth Padre WK38", "name": "10in Planter Cuth Padre WK38", "pot": "10\"", "grower": "Padre", "location": "", "startWeek": 25, "weeksToFinish": 13, "startHeight": 7, "finishHeight": 19, "finishWeek": 38, "order": 24}, {"id": "10in HB Cuth Padre WK38", "name": "10in HB Cuth Padre WK38", "pot": "10\" HB", "grower": "Padre", "location": "", "startWeek": 25, "weeksToFinish": 13, "startHeight": 6, "finishHeight": 16, "finishWeek": 38, "order": 25}, {"id": "14in Cuth Arluno WK38", "name": "14in Cuth Arluno WK38", "pot": "14\"", "grower": "Arluno", "location": "", "startWeek": 22, "weeksToFinish": 16, "startHeight": 11, "finishHeight": 26, "finishWeek": 38, "order": 26}, {"id": "14in Cuth Magnus WK38", "name": "14in Cuth Magnus WK38", "pot": "14\"", "grower": "Magnus", "location": "", "startWeek": 22, "weeksToFinish": 16, "startHeight": 11, "finishHeight": 26, "finishWeek": 38, "order": 27}, {"id": "14in Cuth Padre WK38", "name": "14in Cuth Padre WK38", "pot": "14\"", "grower": "Padre", "location": "", "startWeek": 22, "weeksToFinish": 16, "startHeight": 11, "finishHeight": 26, "finishWeek": 38, "order": 28}, {"id": "14in GC Arluno WK38", "name": "14in GC Arluno WK38", "pot": "14\"", "grower": "Arluno", "location": "", "startWeek": 22, "weeksToFinish": 16, "startHeight": 11, "finishHeight": 26, "finishWeek": 38, "order": 29}, {"id": "14in GC Magnus WK38", "name": "14in GC Magnus WK38", "pot": "14\"", "grower": "Magnus", "location": "", "startWeek": 22, "weeksToFinish": 16, "startHeight": 11, "finishHeight": 26, "finishWeek": 38, "order": 30}, {"id": "14in Tricolor GC Custom WK38", "name": "14in Tricolor GC Custom WK38", "pot": "14\"", "grower": "Custom", "location": "", "startWeek": 22, "weeksToFinish": 16, "startHeight": 11, "finishHeight": 26, "finishWeek": 38, "order": 31}, {"id": "8in Magnus WK39", "name": "8in Magnus WK39", "pot": "8\"", "grower": "Magnus", "location": "", "startWeek": 28, "weeksToFinish": 11, "startHeight": 6, "finishHeight": 15, "finishWeek": 39, "order": 32}, {"id": "9in Magnus WK39", "name": "9in Magnus WK39", "pot": "9\"", "grower": "Magnus", "location": "", "startWeek": 28, "weeksToFinish": 11, "startHeight": 6, "finishHeight": 17, "finishWeek": 39, "order": 33}, {"id": "9in Tricolor Custom WK39", "name": "9in Tricolor Custom WK39", "pot": "9\"", "grower": "Custom", "location": "", "startWeek": 28, "weeksToFinish": 11, "startHeight": 6, "finishHeight": 17, "finishWeek": 39, "order": 34}, {"id": "8in Cuth Aduro WK40", "name": "8in Cuth Ad let DATA = JSON.parse(JSON.stringify(DEFAULT_DATA));
const EVENT_TYPES = ['PGR drench','PGR spray','Black cloth start','Black cloth end','Pinch','Spacing','Spray','Other'];
let bigChart=null, miniCharts=[], chartEvents=[], chartWeeks=[];
const photoCache={};

function isoWeek(d){d=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const day=d.getUTCDay()||7;d.setUTCDate(d.getUTCDate()+4-day);const ys=new Date(Date.UTC(d.getUTCFullYear(),0,1));return Math.ceil((((d-ys)/86400000)+1)/7);}
const CUR_WEEK = isoWeek(new Date());

function targetCurve(c){const out=[];for(let i=0;i<=c.weeksToFinish;i++){out.push({week:c.startWeek+i,idx:i,target:+(c.startHeight+(c.finishHeight-c.startHeight)*i/c.weeksToFinish).toFixed(2)});}return out;}
function actualFor(cropId,week){const r=DATA.readings.find(x=>x.crop===cropId&&+x.week===+week);return r?+r.actual:null;}
function lastActual(c){const cur=targetCurve(c);let last=null;for(const p of cur){const a=actualFor(c.id,p.week);if(a!==null)last={week:p.week,actual:a,target:p.target};}return last;}
function statusOf(c){const la=lastActual(c);if(!la)return{cls:'none',label:'No data',delta:null,la:null};const d=+(la.actual-la.target).toFixed(1);let cls='on',label='On target';if(d>=0.8){cls='ahead';label='Ahead';}else if(d<=-0.8){cls='behind';label='Behind';}return{cls,label,delta:d,la};}
function escA(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;');}
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ---------- nav ---------- */
function tab(t){document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));['dash','detail','log'].forEach(s=>document.getElementById(s).style.display=s===t?'':'none');if(t==='dash')renderDash();if(t==='detail')renderDetail();if(t==='log')renderLog();}

/* ---------- dashboard ---------- */
function renderDash(){
  miniCharts.forEach(c=>c.destroy());miniCharts=[];
  const el=document.getElementById('dash');
  const counts={ahead:0,on:0,behind:0,none:0};
  let html='<div class="grid">';
  DATA.crops.forEach((c,i)=>{
    const s=statusOf(c);counts[s.cls]++;
    const deltaTxt=s.delta===null?'—':(s.delta>0?'+':'')+s.delta+'"';
    const dCls=s.delta===null?'':(s.delta>=0.8?'delta-pos':s.delta<=-0.8?'delta-neg':'delta-on');
    const nEv=DATA.events.filter(e=>e.crop===c.id).length;
    const nPh=DATA.photos.filter(p=>p.crop===c.id).length;
    const extra=(nEv?`<span class="tag">${nEv} event${nEv>1?'s':''}</span>`:'')+(nPh?`<span class="tag bc">${nPh} photo${nPh>1?'s':''}</span>`:'');
    html+=`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:start">
        <div><h3>${escH(c.name)}</h3><div class="sub">${c.pot} · ${escH(c.grower)}${c.location?' · '+escH(c.location):''} · finish wk ${c.finishWeek}</div></div>
        <span class="pill ${s.cls}">${s.label}</span>
      </div>
      <div class="metric"><b>${s.la?s.la.actual+'"':'—'}</b><span class="sub">actual${s.la?' (wk '+s.la.week+')':''}</span>
        <span class="${dCls}" style="margin-left:auto">${deltaTxt} vs target</span></div>
      ${extra?`<div style="margin:2px 0 6px">${extra}</div>`:''}
      <div class="mini"><canvas id="mini${i}"></canvas></div>
    </div>`;
  });
  html+='</div>';
  el.innerHTML=`<div class="row no-print">
      <div class="card" style="padding:10px 16px"><span class="pill ahead">Ahead</span> <b>${counts.ahead}</b></div>
      <div class="card" style="padding:10px 16px"><span class="pill on">On target</span> <b>${counts.on}</b></div>
      <div class="card" style="padding:10px 16px"><span class="pill behind">Behind</span> <b>${counts.behind}</b></div>
      <div class="card" style="padding:10px 16px"><span class="pill none">No data</span> <b>${counts.none}</b></div>
    </div>`+html;
  DATA.crops.forEach((c,i)=>{
    const cur=targetCurve(c);
    miniCharts.push(new Chart(document.getElementById('mini'+i),{type:'line',data:{labels:cur.map(p=>p.week),datasets:[
      {data:cur.map(p=>p.target),borderColor:'#2E7D32',borderWidth:1.5,pointRadius:0,tension:.15},
      {data:cur.map(p=>actualFor(c.id,p.week)),borderColor:'#1565C0',borderWidth:2,pointRadius:0,spanGaps:true,tension:.15}
    ]},options:{plugins:{legend:{display:false}},scales:{x:{display:false},y:{display:false}},maintainAspectRatio:false,animation:false}}));
  });
}

/* ---------- event marker plugin ---------- */
const eventMarkerPlugin={id:'eventMarkers',afterDatasetsDraw(chart){
  try{
    if(!chartEvents.length)return;
    const {ctx,chartArea:{top,bottom},scales:{x}}=chart;
    chartEvents.forEach(ev=>{
      const idx=chartWeeks.indexOf(+ev.week); if(idx<0)return;
      const px=x.getPixelForValue(idx);
      ctx.save();ctx.strokeStyle='#8E24AA';ctx.setLineDash([4,3]);ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(px,top);ctx.lineTo(px,bottom);ctx.stroke();
      ctx.setLineDash([]);ctx.fillStyle='#8E24AA';ctx.font='10px sans-serif';ctx.textAlign='center';
      ctx.fillText(ev.type.replace('Black cloth','BC'), px, top+10);
      ctx.restore();
    });
  }catch(e){}
}};
Chart.register(eventMarkerPlugin);

/* ---------- detail ---------- */
function markerId(c){return 'M'+String(c.order).padStart(2,'0');}
function fillCropSel(){const s=document.getElementById('cropSel');s.innerHTML=DATA.crops.map(c=>`<option value="${escA(c.id)}">${markerId(c)} · ${escH(c.name)}</option>`).join('');}
function stepCrop(d){const s=document.getElementById('cropSel');let i=s.selectedIndex+d;if(i<0)i=0;if(i>=s.options.length)i=s.options.length-1;s.selectedIndex=i;renderDetail();}
function renderDetail(){
  const id=document.getElementById('cropSel').value||(DATA.crops[0]&&DATA.crops[0].id);
  const c=DATA.crops.find(x=>x.id===id); if(!c)return;
  const cur=targetCurve(c);
  chartWeeks=cur.map(p=>p.week);
  chartEvents=DATA.events.filter(e=>e.crop===c.id);
  const hdr=document.getElementById('detailHdr'); if(hdr)hdr.innerHTML=`<span class="idbadge">${markerId(c)}</span> <b>${escH(c.name)}</b> <span class="muted">— ${c.pot} · ${escH(c.grower)}${c.location?' · '+escH(c.location):''} · ready wk ${c.finishWeek}</span>`;
  if(bigChart)bigChart.destroy();
  bigChart=new Chart(document.getElementById('bigChart'),{type:'line',
    data:{labels:cur.map(p=>'Wk '+p.week),datasets:[
      {label:'Target',data:cur.map(p=>p.target),borderColor:'#2E7D32',backgroundColor:'rgba(46,125,50,.08)',borderWidth:2,fill:true,tension:.2,pointRadius:2},
      {label:'Actual',data:cur.map(p=>actualFor(c.id,p.week)),borderColor:'#1565C0',borderWidth:2.5,spanGaps:true,tension:.2,pointRadius:3}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'top'},title:{display:true,text:c.name+'  —  Height (in) vs Week',font:{size:14}}},
      scales:{y:{title:{display:true,text:'Height (in)'},beginAtZero:false}}}});
  const wk=CUR_WEEK;
  const measure=`<div class="panel no-print">
      <h2 class="sec" style="margin-top:0">Log measurement</h2>
      <div class="erow">
        <div class="fld"><label>Week #</label><input type="number" id="mWeek" min="1" max="53" value="${wk}" style="width:88px" onchange="syncMeasure('${escA(c.id)}')"></div>
        <div class="fld"><label>Height (in) <span id="mTgt" class="muted"></span></label><input type="number" step="0.1" id="mHeight" style="width:110px"></div>
        <div class="fld"><label>Photo (optional)</label><input type="file" id="mPhoto" accept="image/*" capture="environment"></div>
        <div class="fld" style="flex:1;min-width:140px"><label>Note (optional)</label><input type="text" id="mNote" placeholder="note for photo / reading"></div>
        <button class="btn go" onclick="saveMeasure('${escA(c.id)}')">Save</button>
        <span id="mStat" class="eStat"></span>
      </div></div>`;
  let rows=cur.map(p=>{const a=actualFor(c.id,p.week);const d=a===null?null:+(a-p.target).toFixed(1);
    const dCls=d===null?'':(d>=0.8?'delta-pos':d<=-0.8?'delta-neg':'delta-on');
    return `<tr class="${p.week===CUR_WEEK?'cur':''}"><td>${p.idx}</td><td>${p.week}</td><td>${p.target.toFixed(1)}"</td><td>${a===null?'—':a+'"'}</td><td class="${dCls}">${d===null?'':(d>0?'+':'')+d+'"'}</td></tr>`;}).join('');
  document.getElementById('detailTable').innerHTML=measure+`<h2 class="sec">Week-by-week</h2><table><tr><th>Wk idx</th><th>Week #</th><th>Target</th><th>Actual</th><th>Δ</th></tr>${rows}</table>`;
  syncMeasure(c.id);
  renderEvents(c);
  renderPhotos(c);
}
function syncMeasure(cropId){const c=DATA.crops.find(x=>x.id===cropId);if(!c)return;const wk=+document.getElementById('mWeek').value;const cur=targetCurve(c);const p=cur.find(x=>x.week===wk);const saved=actualFor(c.id,wk);
  const t=document.getElementById('mTgt');if(t)t.textContent=p?('· target '+p.target.toFixed(1)+'"'):'· (out of window)';
  const h=document.getElementById('mHeight');if(h&&saved!==null)h.value=saved;
  const st=document.getElementById('mStat');if(st){st.className='eStat '+(saved!==null?'ok':'');st.textContent=saved!==null?('✓ logged '+saved+'"'):'';}
}

/* ---------- events ---------- */
function renderEvents(c){
  const evs=DATA.events.filter(e=>e.crop===c.id).sort((a,b)=>(+a.week||0)-(+b.week||0)||String(a.date).localeCompare(b.date));
  let list = evs.length ? '<ul class="evt-list">'+evs.map(e=>`<li><span class="evt-wk">WK${e.week||'?'}</span><span><b>${escH(e.type)}</b>${e.note?' — <span class="evt-note">'+escH(e.note)+'</span>':''} <span class="evt-note">· ${escH(e.date)}${e.loggedBy?' · '+escH(e.loggedBy):''}</span></span></li>`).join('')+'</ul>' : '<p class="muted">No events logged yet.</p>';
  const typeOpts=EVENT_TYPES.map(t=>`<option>${t}</option>`).join('');
  document.getElementById('eventsBox').innerHTML=`<h2 class="sec">Events</h2>
    <div class="panel no-print">
      <div class="row" style="margin-bottom:8px">
        <div class="fld"><label>Type</label><select id="evType">${typeOpts}</select></div>
        <div class="fld"><label>Week #</label><input type="number" id="evWeek" min="1" max="53" value="${CUR_WEEK}" style="width:90px"></div>
        <div class="fld" style="flex:1;min-width:180px"><label>Note (optional)</label><input type="text" id="evNote" placeholder="e.g. Bonzi 4ppm drench"></div>
        <div class="fld"><label>Apply to</label><select id="evScope">
          <option value="one">This crop</option>
          <option value="pot">All ${c.pot} crops</option>
          <option value="week">All ready-week WK${c.finishWeek}</option>
          <option value="all">All crops</option>
        </select></div>
        <button class="btn go" onclick="addEvent('${escA(c.id)}')">Add event</button>
      </div>
      ${list}
    </div>`;
}
function scopeCrops(cropId,scope){
  const c=DATA.crops.find(x=>x.id===cropId);
  if(scope==='all')return DATA.crops.map(x=>x.id);
  if(scope==='pot')return DATA.crops.filter(x=>x.pot===c.pot).map(x=>x.id);
  if(scope==='week')return DATA.crops.filter(x=>x.finishWeek===c.finishWeek).map(x=>x.id);
  return [cropId];
}
async function addEvent(cropId){
  const type=document.getElementById('evType').value;
  const week=+document.getElementById('evWeek').value||'';
  const note=document.getElementById('evNote').value.trim();
  const scope=document.getElementById('evScope').value;
  const who=document.getElementById('who').value||'web';
  const crops=scopeCrops(cropId,scope);
  const date=new Date().toISOString().slice(0,10);
  crops.forEach(cid=>DATA.events.push({crop:cid,week,date,type,note,loggedBy:who}));
  renderDetail();
  enqueue({action:'saveEvent',crops,week,date,type,note,loggedBy:who});
  toast('Logged "'+type+'" to '+crops.length+' crop(s)'+(navigator.onLine?'':' (queued offline)'));
}

/* ---------- photos ---------- */
function renderPhotos(c){
  const phs=DATA.photos.filter(p=>p.crop===c.id).sort((a,b)=>(+a.week||0)-(+b.week||0));
  let gal = phs.length ? '<div class="gallery">'+phs.map(p=>`<div class="ph"><img id="img_${p.fileId}" alt="loading…" onclick="openPhoto('${p.fileId}')"><div class="cap">WK${p.week||'?'} · ${escH(p.date)}${p.note?' · '+escH(p.note):''}</div></div>`).join('')+'</div>' : '<p class="muted">No photos yet.</p>';
  document.getElementById('photosBox').innerHTML=`<h2 class="sec">Photos</h2>
    <div class="panel no-print">
      <div class="row" style="margin-bottom:8px">
        <div class="fld"><label>Photo</label><input type="file" id="phFile" accept="image/*"></div>
        <div class="fld"><label>Week #</label><input type="number" id="phWeek" min="1" max="53" value="${CUR_WEEK}" style="width:90px"></div>
        <div class="fld" style="flex:1;min-width:160px"><label>Note (optional)</label><input type="text" id="phNote" placeholder="e.g. nice color break"></div>
        <button class="btn go" onclick="uploadPhoto('${escA(c.id)}')">Upload photo</button>
      </div>
      ${gal}
    </div>`;
  phs.forEach(p=>loadPhoto(p.fileId));
}
function loadPhoto(fileId){
  const img=document.getElementById('img_'+fileId); if(!img)return;
  if(photoCache[fileId]){img.src=photoCache[fileId];return;}
  const url=getUrl(); if(!url)return;
  fetch(url+(url.includes('?')?'&':'?')+'action=photo&id='+encodeURIComponent(fileId))
    .then(r=>r.json()).then(j=>{if(j&&j.ok){const d='data:'+j.mime+';base64,'+j.b64;photoCache[fileId]=d;img.src=d;}}).catch(()=>{});
}
function openPhoto(fileId){if(photoCache[fileId]){const w=window.open();w.document.write('<img src="'+photoCache[fileId]+'" style="max-width:100%">');}}
function resizeImage(file,maxDim){return new Promise((res,rej)=>{const img=new Image();const u=URL.createObjectURL(file);img.onload=()=>{let w=img.width,h=img.height;const s=Math.min(1,maxDim/Math.max(w,h));const cw=Math.round(w*s),ch=Math.round(h*s);const cv=document.createElement('canvas');cv.width=cw;cv.height=ch;cv.getContext('2d').drawImage(img,0,0,cw,ch);URL.revokeObjectURL(u);res(cv.toDataURL('image/jpeg',0.82));};img.onerror=rej;img.src=u;});}
async function uploadPhoto(cropId){
  const f=document.getElementById('phFile').files[0];
  if(!f){toast('Pick a photo first');return;}
  const week=+document.getElementById('phWeek').value||'';
  const note=document.getElementById('phNote').value.trim();
  const who=document.getElementById('who').value||'web';
  try{
    const dataUrl=await resizeImage(f,1200);const b64=dataUrl.split(',')[1];
    const tmp='tmp'+Date.now();photoCache[tmp]=dataUrl;
    DATA.photos.push({crop:cropId,week,date:new Date().toISOString().slice(0,10),fileId:tmp,note,loggedBy:who});
    enqueue({action:'savePhoto',crop:cropId,week,note,loggedBy:who,mime:'image/jpeg',b64});
    renderDetail();toast(navigator.onLine?'Photo saved':'Photo queued offline');
  }catch(e){toast('Upload error: '+e);}
}

/* ---------- events log (all crops) ---------- */
function renderLog(){
  const types=['All types'].concat(EVENT_TYPES).map(t=>`<option>${t}</option>`).join('');
  const pots=['All pots'].concat([...new Set(DATA.crops.map(c=>c.pot))]).map(p=>`<option>${p}</option>`).join('');
  document.getElementById('log').innerHTML=`<h2 class="sec" style="margin-top:0">Events log — all crops</h2>
    <p class="hint">Every event logged this season. Filter by type or pot size, or search crop/notes.</p>
    <div class="row no-print">
      <div class="fld"><label>Type</label><select id="logType" onchange="drawLog()">${types}</select></div>
      <div class="fld"><label>Pot</label><select id="logPot" onchange="drawLog()">${pots}</select></div>
      <div class="fld" style="flex:1;min-width:200px"><label>Search</label><input type="text" id="logQ" placeholder="crop or note…" oninput="drawLog()"></div>
    </div>
    <div id="logTable"></div>`;
  drawLog();
}
function drawLog(){
  const byId={};DATA.crops.forEach(c=>byId[c.id]=c);
  const fT=(document.getElementById('logType')||{}).value||'All types';
  const fP=(document.getElementById('logPot')||{}).value||'All pots';
  const fQ=((document.getElementById('logQ')||{}).value||'').toLowerCase();
  let rows=DATA.events.filter(e=>{
    const c=byId[e.crop];
    if(fT!=='All types'&&e.type!==fT)return false;
    if(fP!=='All pots'&&(!c||c.pot!==fP))return false;
    if(fQ&&!((e.crop+' '+e.type+' '+(e.note||'')).toLowerCase().includes(fQ)))return false;
    return true;
  }).sort((a,b)=>(+a.week||0)-(+b.week||0)||String(a.crop).localeCompare(b.crop));
  const body=rows.map(e=>{const c=byId[e.crop];
    return `<tr><td>WK${e.week||'?'}</td><td>${escH(e.date)}</td><td class="l">${escH(e.crop)}</td><td>${c?c.pot:''}</td><td><span class="tag">${escH(e.type)}</span></td><td class="l">${escH(e.note||'')}</td><td>${escH(e.loggedBy||'')}</td></tr>`;}).join('');
  document.getElementById('logTable').innerHTML = rows.length
    ? `<p class="muted">${rows.length} event${rows.length>1?'s':''}</p><table><tr><th>Week</th><th>Date</th><th class="l">Crop</th><th>Pot</th><th>Type</th><th class="l">Note</th><th>By</th></tr>${body}</table>`
    : '<p class="muted">No events match. Log events from any crop on the Crop Detail tab.</p>';
}

/* ---------- offline queue + per-crop save ---------- */
function idb(){return new Promise((res,rej)=>{const r=indexedDB.open('mumq',1);r.onupgradeneeded=()=>r.result.createObjectStore('q',{keyPath:'id',autoIncrement:true});r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
async function qAdd(item){const db=await idb();return new Promise((res,rej)=>{const tx=db.transaction('q','readwrite');tx.objectStore('q').add(item);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);});}
async function qAll(){const db=await idb();return new Promise((res,rej)=>{const tx=db.transaction('q','readonly');const rq=tx.objectStore('q').getAll();rq.onsuccess=()=>res(rq.result);rq.onerror=()=>rej(rq.error);});}
async function qDel(id){const db=await idb();return new Promise((res,rej)=>{const tx=db.transaction('q','readwrite');tx.objectStore('q').delete(id);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);});}
let flushing=false;
async function flushQueue(){
  if(flushing)return;flushing=true;
  try{const url=getUrl();if(!url)return;
    const items=await qAll();
    for(const it of items){
      try{const r=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(it.payload)});const j=await r.json();if(j&&j.ok!==false){await qDel(it.id);}else break;}
      catch(e){break;}
    }
  }finally{flushing=false;updateQueueBadge();}
}
async function updateQueueBadge(){try{const n=(await qAll()).length;const el=document.getElementById('qbadge');if(el)el.textContent=n?('⏳ '+n+' queued — will sync'):'';}catch(e){}}
async function enqueue(payload){try{await qAdd({payload,ts:Date.now()});}catch(e){}updateQueueBadge();flushQueue();}
function upsertLocal(crop,week,actual,who){const r=DATA.readings.find(x=>x.crop===crop&&+x.week===+week);if(r){r.actual=actual;r.loggedBy=who;}else DATA.readings.push({crop,week,actual,loggedBy:who,timestamp:''});}
async function saveMeasure(cropId){
  const wk=+document.getElementById('mWeek').value;const who=document.getElementById('who').value||'web';
  const hv=document.getElementById('mHeight').value.trim();const file=document.getElementById('mPhoto').files[0];const note=document.getElementById('mNote').value.trim();
  if(hv===''&&!file){toast('Enter a height or add a photo');return;}
  if(hv!==''){const a=+hv;enqueue({action:'save',crop:cropId,week:wk,actual:a,loggedBy:who});upsertLocal(cropId,wk,a,who);}
  if(file){try{const d=await resizeImage(file,1200);const b64=d.split(',')[1];const tmp='tmp'+Date.now();photoCache[tmp]=d;DATA.photos.push({crop:cropId,week:wk,date:new Date().toISOString().slice(0,10),fileId:tmp,note,loggedBy:who});enqueue({action:'savePhoto',crop:cropId,week:wk,note,loggedBy:who,mime:'image/jpeg',b64});}catch(e){toast('Photo error: '+e);return;}}
  const c=DATA.crops.find(x=>x.id===cropId);
  toast((navigator.onLine?'Saved':'Queued offline')+' · '+(c?markerId(c):''));
  renderDetail();
}

/* ---------- connect ---------- */
function getUrl(){return (document.getElementById('apiUrl').value||'').trim();}
async function connect(){
  const url=getUrl();localStorage.setItem('mum_url',url);localStorage.setItem('mum_who',document.getElementById('who').value||'');
  if(!url){setStatus('Using built-in data (offline).');return;}
  setStatus('Connecting…');
  try{const r=await fetch(url+(url.includes('?')?'&':'?')+'action=all');const j=await r.json();
    if(j&&j.crops&&j.crops.length){DATA={crops:j.crops,readings:j.readings||[],events:j.events||[],photos:j.photos||[]};
      setStatus('🟢 Live — '+DATA.crops.length+' crops, '+DATA.readings.length+' readings, '+DATA.events.length+' events, '+DATA.photos.length+' photos. Synced '+new Date().toLocaleTimeString());refresh();}
    else setStatus('Connected but no data returned.');}
  catch(e){setStatus('⚠️ Could not reach Sheet. Using built-in data. ('+e+')');}
}
function setStatus(t){document.getElementById('status').textContent=t;}
function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2800);}
function refresh(){fillCropSel();const active=document.querySelector('nav button.active').dataset.tab;tab(active);}

/* ---------- init ---------- */
(function init(){
  const u=localStorage.getItem('mum_url')||DEFAULT_API_URL;document.getElementById('apiUrl').value=u;
  const w=localStorage.getItem('mum_who');if(w)document.getElementById('who').value=w;
  fillCropSel();renderDash();updateQueueBadge();
  window.addEventListener('online',flushQueue);
  if(u){connect();flushQueue();}
})();
</script>
</body>
</html>
